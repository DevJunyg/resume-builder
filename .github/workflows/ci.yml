name: CI

# PR 및 main push마다 품질 게이트 실행.
# 이 잡을 branch protection의 "required status check"로 지정하면
# 통과 전에는 main 머지가 차단된다.
on:
  pull_request:
  push:
    branches: [main]

# 같은 브랜치에서 새 커밋이 오면 진행 중이던 실행을 취소 (러너/시간 절약)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # package-lock.json 기준 재현 가능한 설치
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # 빌드까지 통과해야 실제로 배포 가능한 상태임을 보장
      - name: Build
        run: npm run build
